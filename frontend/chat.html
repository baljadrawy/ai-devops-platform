<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دردشة AI</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            padding: 20px;
            gap: 20px;
        }
        
        /* ==================== Sidebar ==================== */
        .sidebar {
            width: 280px;
            background: white;
            border-radius: 20px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .sidebar-header {
            margin-bottom: 20px;
        }
        .sidebar-header h2 {
            color: #667eea;
            font-size: 1.3em;
            margin-bottom: 15px;
        }
        .new-chat-btn {
            width: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1em;
            font-weight: bold;
        }
        .new-chat-btn:hover { opacity: 0.9; }
        
        .sessions-list {
            flex: 1;
            overflow-y: auto;
            margin-top: 15px;
        }
        .session-item {
            padding: 12px;
            margin-bottom: 8px;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.2s;
            background: #f8f9fa;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .session-item:hover {
            background: #e9ecef;
        }
        .session-item.active {
            background: #667eea;
            color: white;
        }
        .session-title {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            font-size: 0.9em;
        }
        .session-delete {
            background: transparent;
            border: none;
            color: #ef4444;
            cursor: pointer;
            font-size: 1.1em;
            padding: 0 5px;
        }
        .session-item.active .session-delete {
            color: white;
        }
        
        /* ==================== Chat Container ==================== */
        .chat-container {
            flex: 1;
            background: white;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .chat-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 20px 20px 0 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .chat-header h2 { font-size: 1.5em; }
        .back-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            text-decoration: none;
        }
        .back-btn:hover { background: rgba(255,255,255,0.3); }
        
        .messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .message {
            max-width: 70%;
            padding: 15px 20px;
            border-radius: 15px;
            line-height: 1.6;
            white-space: pre-wrap;
        }
        .message.user {
            background: #667eea;
            color: white;
            align-self: flex-end;
            border-radius: 15px 15px 5px 15px;
        }
        .message.assistant {
            background: #f0f0f0;
            color: #333;
            align-self: flex-start;
            border-radius: 15px 15px 15px 5px;
        }
        .input-area {
            padding: 20px;
            border-top: 1px solid #e0e0e0;
            display: flex;
            gap: 10px;
        }
        #messageInput {
            flex: 1;
            padding: 15px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 25px;
            font-size: 1em;
            outline: none;
            font-family: inherit;
        }
        #messageInput:focus { border-color: #667eea; }
        #sendBtn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1em;
            font-weight: bold;
        }
        #sendBtn:hover { opacity: 0.9; }
        #sendBtn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .typing {
            display: none;
            padding: 15px 20px;
            background: #f0f0f0;
            border-radius: 15px;
            max-width: 70px;
        }
        .typing span {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #667eea;
            border-radius: 50%;
            margin: 0 2px;
            animation: typing 1.4s infinite;
        }
        .typing span:nth-child(2) { animation-delay: 0.2s; }
        .typing span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-10px); }
        }
        
        /* Mobile responsive */
        @media (max-width: 768px) {
            body { flex-direction: column; padding: 10px; }
            .sidebar { width: 100%; height: 200px; }
            .sessions-list { max-height: 120px; }
        }
    </style>
</head>
<body>
    <!-- Sidebar -->
    <div class="sidebar">
        <div class="sidebar-header">
            <h2>💬 المحادثات</h2>
            <button class="new-chat-btn" onclick="createNewChat()">➕ محادثة جديدة</button>
        </div>
        <div class="sessions-list" id="sessionsList">
            <!-- Sessions will be loaded here -->
        </div>
    </div>
    
    <!-- Chat Container -->
    <div class="chat-container">
        <div class="chat-header">
            <h2 id="chatTitle">💬 دردشة جديدة</h2>
            <a href="/" class="back-btn">← الرئيسية</a>
        </div>
        
        <div class="messages" id="messages">
            <div class="message assistant">
                مرحباً! أنا Claude، مساعدك الذكي. كيف يمكنني مساعدتك اليوم؟
            </div>
        </div>
        
        <div class="typing" id="typing">
            <span></span>
            <span></span>
            <span></span>
        </div>
        
        <div class="input-area">
            <input type="text" id="messageInput" placeholder="اكتب رسالتك هنا..." />
            <button id="sendBtn">إرسال 🚀</button>
        </div>
    </div>
    
    <script>
        let currentSessionId = generateSessionId();
        let sessions = loadSessions();
        
        function generateSessionId() {
            return 'chat_' + Date.now();
        }
        
        function loadSessions() {
            const saved = localStorage.getItem('chatSessions');
            return saved ? JSON.parse(saved) : [];
        }
        
        function saveSessions() {
            localStorage.setItem('chatSessions', JSON.stringify(sessions));
        }
        
        function renderSessions() {
            const list = document.getElementById('sessionsList');
            list.innerHTML = '';
            
            if (sessions.length === 0) {
                list.innerHTML = '<div style="text-align: center; color: #888; padding: 20px;">لا توجد محادثات</div>';
                return;
            }
            
            sessions.forEach(session => {
                const item = document.createElement('div');
                item.className = 'session-item' + (session.id === currentSessionId ? ' active' : '');
                item.innerHTML = `
                    <div class="session-title">${session.title}</div>
                    <button class="session-delete" onclick="deleteSession('${session.id}', event)">🗑️</button>
                `;
                item.onclick = (e) => {
                    if (!e.target.classList.contains('session-delete')) {
                        switchSession(session.id);
                    }
                };
                list.appendChild(item);
            });
        }
        
        function createNewChat() {
            currentSessionId = generateSessionId();
            const newSession = {
                id: currentSessionId,
                title: 'محادثة جديدة',
                messages: [],
                createdAt: new Date().toISOString()
            };
            sessions.unshift(newSession);
            saveSessions();
            
            document.getElementById('messages').innerHTML = `
                <div class="message assistant">
                    مرحباً! أنا Claude، مساعدك الذكي. كيف يمكنني مساعدتك اليوم؟
                </div>
            `;
            document.getElementById('chatTitle').textContent = 'محادثة جديدة';
            renderSessions();
        }
        
        function switchSession(sessionId) {
            currentSessionId = sessionId;
            const session = sessions.find(s => s.id === sessionId);
            
            if (!session) return;
            
            const messagesDiv = document.getElementById('messages');
            messagesDiv.innerHTML = '';
            
            if (session.messages.length === 0) {
                messagesDiv.innerHTML = `
                    <div class="message assistant">
                        مرحباً! أنا Claude، مساعدك الذكي. كيف يمكنني مساعدتك اليوم؟
                    </div>
                `;
            } else {
                session.messages.forEach(msg => {
                    addMessageToUI(msg.text, msg.role);
                });
            }
            
            document.getElementById('chatTitle').textContent = session.title;
            renderSessions();
        }
        
        function deleteSession(sessionId, event) {
            event.stopPropagation();
            
            if (!confirm('هل أنت متأكد من حذف هذه المحادثة؟')) {
                return;
            }
            
            sessions = sessions.filter(s => s.id !== sessionId);
            saveSessions();
            
            if (sessionId === currentSessionId) {
                if (sessions.length > 0) {
                    switchSession(sessions[0].id);
                } else {
                    createNewChat();
                }
            } else {
                renderSessions();
            }
        }
        
        function updateSessionTitle(message) {
            const session = sessions.find(s => s.id === currentSessionId);
            if (session && session.title === 'محادثة جديدة') {
                session.title = message.substring(0, 30) + (message.length > 30 ? '...' : '');
                saveSessions();
                renderSessions();
                document.getElementById('chatTitle').textContent = session.title;
            }
        }
        
        function addMessageToUI(text, role) {
            const messagesDiv = document.getElementById('messages');
            const div = document.createElement('div');
            div.className = `message ${role}`;
            div.textContent = text;
            messagesDiv.appendChild(div);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }
        
        function saveMessageToSession(text, role) {
            const session = sessions.find(s => s.id === currentSessionId);
            if (session) {
                session.messages.push({ text, role, timestamp: new Date().toISOString() });
                saveSessions();
            }
        }
        
        async function sendMessage() {
            const messageInput = document.getElementById('messageInput');
            const sendBtn = document.getElementById('sendBtn');
            const typing = document.getElementById('typing');
            
            const message = messageInput.value.trim();
            if (!message) return;
            
            // Update title from first message
            updateSessionTitle(message);
            
            // Add user message
            addMessageToUI(message, 'user');
            saveMessageToSession(message, 'user');
            
            messageInput.value = '';
            sendBtn.disabled = true;
            typing.style.display = 'block';
            
            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        message,
                        sessionId: currentSessionId 
                    })
                });
                
                const data = await response.json();
                typing.style.display = 'none';
                
                addMessageToUI(data.message, 'assistant');
                saveMessageToSession(data.message, 'assistant');
                
            } catch (error) {
                typing.style.display = 'none';
                addMessageToUI('عذراً، حدث خطأ في الاتصال. حاول مرة أخرى.', 'assistant');
            }
            
            sendBtn.disabled = false;
            messageInput.focus();
        }
        
        document.getElementById('sendBtn').addEventListener('click', sendMessage);
        document.getElementById('messageInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
        
        // Initialize
        if (sessions.length === 0) {
            createNewChat();
        } else {
            switchSession(sessions[0].id);
        }
        renderSessions();
    </script>
</body>
</html>
