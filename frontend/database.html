<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Database Manager</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 30px;
            max-width: 1200px;
            margin: 0 auto;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }
        h1 { color: #667eea; font-size: 2em; }
        .back-btn {
            background: #667eea;
            color: white;
            padding: 10px 20px;
            border-radius: 10px;
            text-decoration: none;
        }
        .section {
            background: #f8f9fa;
            padding: 25px;
            border-radius: 15px;
            margin-bottom: 20px;
        }
        .section h2 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 1.3em;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            color: #666;
            font-weight: bold;
        }
        input, select, textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1em;
            font-family: inherit;
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        textarea {
            font-family: 'Courier New', monospace;
            min-height: 100px;
        }
        button {
            background: #667eea;
            color: white;
            padding: 12px 25px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1em;
            font-weight: bold;
        }
        button:hover { opacity: 0.8; }
        .result {
            background: white;
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
            border-left: 4px solid #667eea;
        }
        .result pre {
            overflow-x: auto;
            font-family: 'Courier New', monospace;
            font-size: 0.9em;
        }
        .connections {
            display: grid;
            gap: 10px;
        }
        .connection-item {
            background: white;
            padding: 15px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🗄️ إدارة قواعد البيانات</h1>
            <a href="/" class="back-btn">← الرئيسية</a>
        </div>
        
        <div class="section">
            <h2>📡 الاتصالات النشطة</h2>
            <div id="connections" class="connections">
                <div style="text-align: center; color: #888;">لا توجد اتصالات نشطة</div>
            </div>
        </div>
        
        <div class="section">
            <h2>➕ اتصال جديد</h2>
            <div class="form-group">
                <label>نوع قاعدة البيانات:</label>
                <select id="dbType">
                    <option value="postgres">PostgreSQL</option>
                    <option value="mysql">MySQL</option>
                    <option value="mongodb">MongoDB</option>
                    <option value="sqlite">SQLite</option>
                </select>
            </div>
            <div class="form-group">
                <label>اسم الاتصال:</label>
                <input type="text" id="connName" placeholder="مثال: mydb" />
            </div>
            <div class="form-group">
                <label>Host:</label>
                <input type="text" id="host" placeholder="localhost أو ai-postgres" value="ai-postgres" />
            </div>
            <div class="form-group">
                <label>Database:</label>
                <input type="text" id="database" placeholder="اسم قاعدة البيانات" value="aiagent" />
            </div>
            <div class="form-group">
                <label>User:</label>
                <input type="text" id="user" placeholder="المستخدم" value="postgres" />
            </div>
            <div class="form-group">
                <label>Password:</label>
                <input type="password" id="password" placeholder="كلمة المرور" />
            </div>
            <button onclick="connectDB()">🔌 اتصال</button>
            <div id="connectResult"></div>
        </div>
        
        <div class="section">
            <h2>📝 تنفيذ استعلام SQL</h2>
            <div class="form-group">
                <label>اسم الاتصال:</label>
                <input type="text" id="queryConnName" placeholder="اسم الاتصال" />
            </div>
            <div class="form-group">
                <label>SQL Query:</label>
                <textarea id="sqlQuery" placeholder="SELECT * FROM users LIMIT 10"></textarea>
            </div>
            <button onclick="executeQuery()">▶️ تنفيذ</button>
            <div id="queryResult"></div>
        </div>
    </div>
    
    <script>
        async function loadConnections() {
            try {
                const response = await fetch('/api/database/connections');
                const data = await response.json();
                
                const div = document.getElementById('connections');
                if (!data.connections || data.connections.length === 0) {
                    div.innerHTML = '<div style="text-align: center; color: #888;">لا توجد اتصالات نشطة</div>';
                    return;
                }
                
                div.innerHTML = '';
                data.connections.forEach(conn => {
                    const item = document.createElement('div');
                    item.className = 'connection-item';
                    item.innerHTML = `
                        <div>
                            <strong>${conn.name}</strong>
                            <span style="color: #888; margin-right: 10px;">(${conn.type})</span>
                        </div>
                        <span style="color: #10b981;">✅ متصل</span>
                    `;
                    div.appendChild(item);
                });
            } catch (error) {
                console.error('خطأ:', error);
            }
        }
        
        async function connectDB() {
            const resultDiv = document.getElementById('connectResult');
            resultDiv.innerHTML = '<div class="result">⏳ جاري الاتصال...</div>';
            
            const data = {
                type: document.getElementById('dbType').value,
                name: document.getElementById('connName').value,
                config: {
                    host: document.getElementById('host').value,
                    database: document.getElementById('database').value,
                    user: document.getElementById('user').value,
                    password: document.getElementById('password').value
                }
            };
            
            try {
                const response = await fetch('/api/database/connect', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(data)
                });
                
                const result = await response.json();
                
                if (result.success) {
                    resultDiv.innerHTML = `<div class="result">✅ ${result.message}</div>`;
                    loadConnections();
                } else {
                    resultDiv.innerHTML = `<div class="result">❌ خطأ: ${result.error}</div>`;
                }
            } catch (error) {
                resultDiv.innerHTML = `<div class="result">❌ خطأ: ${error.message}</div>`;
            }
        }
        
        async function executeQuery() {
            const resultDiv = document.getElementById('queryResult');
            resultDiv.innerHTML = '<div class="result">⏳ جاري التنفيذ...</div>';
            
            const data = {
                name: document.getElementById('queryConnName').value,
                sql: document.getElementById('sqlQuery').value
            };
            
            try {
                const response = await fetch('/api/database/query', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(data)
                });
                
                const result = await response.json();
                
                if (result.success) {
                    resultDiv.innerHTML = `
                        <div class="result">
                            <strong>✅ نجح التنفيذ</strong>
                            <pre>${JSON.stringify(result.data || result.summary, null, 2)}</pre>
                        </div>
                    `;
                } else {
                    resultDiv.innerHTML = `<div class="result">❌ خطأ: ${result.error}</div>`;
                }
            } catch (error) {
                resultDiv.innerHTML = `<div class="result">❌ خطأ: ${error.message}</div>`;
            }
        }
        
        loadConnections();
        setInterval(loadConnections, 5000);
    </script>
</body>
</html>
